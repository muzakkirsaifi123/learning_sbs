site_name: MuZakkir's Learning Zone
site_description: Personal learning notes on Kubernetes, DevOps, and Cloud Engineering
site_url: https://muzakkirsaifi123.github.io/learning_sbs/
site_author: Saifi
copyright: Copyright &copy; 2026 Saifi

theme:
  name: material
  favicon: assets/logo.svg
  logo: assets/logo.svg
  language: en

  # 3-palette system: auto (OS preference) → light → dark
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips
    - toc.follow
    - announce.dismiss

  icon:
    repo: octicons/mark-github-24

repo_name: MuzOps / learning
repo_url: https://github.com/muzakkirsaifi123/learning_sbs
edit_uri: ""

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - def_list
  - toc:
      permalink: true
      title: On this page
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

extra:
  generator: false
  social:
    - icon: octicons/mark-github-24
      link: https://github.com/saifi
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/saifi
      name: LinkedIn

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/recent.js

nav:
  - Home: index.md
  - Tags: tags.md
  - Kubernetes:
      - Operators:
          - Kubernetes Operator: kubernetes_operators/kubernetes_operator.md
  - Notion:
      - Kubernetes:
          - Kubernetes: notion/kubernetes.md
          - K8sgpt: notion/kubernetes/k8sgpt.md
      - Kafka:
          - Kafka: notion/kafka.md
          - Kafka: notion/kafka/kafka.md

plugins:
  - tags:
      tags_file: tags.md
  - social
  - search:
      lang: en
  - awesome-pages
  - privacy
  - offline
  - glightbox
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - git-committers:
      repository: muzakkirsaifi123/learning_sbs
      branch: main
      token: !ENV GITHUB_TOKEN